name: release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go fmt ./...
      - run: go mod tidy
      - run: git diff --exit-code
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
      - name: Cross-build release targets
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build ./...
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, archive: tar.gz }
          - { goos: linux, goarch: arm64, archive: tar.gz }
          - { goos: darwin, goarch: amd64, archive: tar.gz }
          - { goos: darwin, goarch: arm64, archive: tar.gz }
          - { goos: windows, goarch: amd64, archive: zip }
          - { goos: windows, goarch: arm64, archive: zip }
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          BINARY=atlas
          if [ "$GOOS" = "windows" ]; then BINARY=atlas.exe; fi
          go build -ldflags="-s -w" -o "$BINARY" ./cmd/atlas
      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar czf "atlas-${GOOS}-${GOARCH}-v${VERSION}.tar.gz" atlas
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          zip "atlas-${GOOS}-${GOARCH}-v${VERSION}.zip" atlas.exe
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: atlas-${{ matrix.goos }}-${{ matrix.goarch }}
          path: atlas-${{ matrix.goos }}-${{ matrix.goarch }}-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum atlas-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/atlas-*.tar.gz
            artifacts/atlas-*.zip
            artifacts/SHA256SUMS
            scripts/install.sh
            scripts/install.ps1
